# Training Configuration for Qwen3-VL-2B
# PDF-to-Markdown VLM fine-tuning: SFT warm-up → GRPO refinement

model:
  name: "unsloth/Qwen3-VL-2B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 32
  alpha: 64
  dropout: 0.0
  target_modules: "all"

sft:
  max_steps: 100                  # SFT warm-up: teach exact format
  learning_rate: 2.0e-5

grpo:
  num_generations: 4
  max_completion_length: 1024
  learning_rate: 5.0e-6           # Lower LR for GRPO refinement after SFT
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 0.5
  bf16: true
  optim: "adamw_8bit"
  logging_steps: 5
  save_steps: 100
  save_total_limit: 2
  max_steps: 100                  # GRPO refinement after SFT

reward:
  weights:
    edit_distance: 0.4
    structural: 0.15
    heading: 0.2
    reading_order: 0.25

data:
  train_dir: "data/processed"
  max_train_samples: 500
  languages: ["en", "ja"]

output:
  dir: "results/qwen3vl2b_v2"
  save_model: true
  push_to_hub: false
