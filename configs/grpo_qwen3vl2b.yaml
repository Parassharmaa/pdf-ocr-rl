# GRPO Training Configuration for Qwen3-VL-2B (smaller, faster model)
# PDF-to-Markdown VLM fine-tuning with RL

model:
  name: "unsloth/Qwen3-VL-2B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules: "all"

grpo:
  num_generations: 4
  max_completion_length: 768    # Longer completions for better markdown
  learning_rate: 5.0e-6
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 0.5
  bf16: true
  optim: "adamw_8bit"
  logging_steps: 5
  save_steps: 50
  save_total_limit: 2
  max_steps: 100                # More steps since 2B is faster to train

reward:
  weights:
    edit_distance: 0.4
    structural: 0.15
    heading: 0.2
    reading_order: 0.25

data:
  train_dir: "data/processed"
  max_train_samples: 500
  languages: ["en", "ja"]

output:
  dir: "results/grpo_qwen3vl2b"
  save_model: true
  push_to_hub: false
