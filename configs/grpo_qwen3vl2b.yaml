# GRPO Training Configuration for Qwen3-VL-2B (smaller, faster model)
# PDF-to-Markdown VLM fine-tuning with RL

model:
  name: "unsloth/Qwen3-VL-2B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 32
  alpha: 64
  dropout: 0.0
  target_modules: "all"

grpo:
  num_generations: 6              # More generations for better reward signal
  max_completion_length: 1024     # Longer completions (no thinking overhead now)
  learning_rate: 2.0e-5           # 4x higher LR for GRPO policy gradient
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 0.5
  bf16: true
  optim: "adamw_8bit"
  logging_steps: 5
  save_steps: 100
  save_total_limit: 2
  max_steps: 200                  # 2x more steps for meaningful weight changes

reward:
  weights:
    edit_distance: 0.4
    structural: 0.15
    heading: 0.2
    reading_order: 0.25

data:
  train_dir: "data/processed"
  max_train_samples: 500
  languages: ["en", "ja"]

output:
  dir: "results/grpo_qwen3vl2b_v2"
  save_model: true
  push_to_hub: false
