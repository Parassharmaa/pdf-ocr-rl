# Training Configuration for Qwen3-VL-2B (v3)
# SFT warm-up → shorter GRPO with higher edit_distance weight
# v2 showed GRPO over-optimized structural metrics at cost of edit_distance

model:
  name: "unsloth/Qwen3-VL-2B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 32
  alpha: 64
  dropout: 0.0
  target_modules: "all"

sft:
  max_steps: 100
  learning_rate: 2.0e-5

grpo:
  num_generations: 4
  max_completion_length: 1024
  learning_rate: 2.0e-6           # Even lower LR to avoid divergence
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 0.5
  bf16: true
  optim: "adamw_8bit"
  logging_steps: 5
  save_steps: 50
  save_total_limit: 2
  max_steps: 50                   # Shorter GRPO to prevent over-optimization

reward:
  weights:
    edit_distance: 0.6            # Heavier weight on character fidelity
    structural: 0.1
    heading: 0.15
    reading_order: 0.15

data:
  train_dir: "data/processed"
  max_train_samples: 500
  languages: ["en", "ja"]

output:
  dir: "results/qwen3vl2b_v3"
  save_model: true
  push_to_hub: false
