# GRPO Training Configuration for PDF-to-Markdown
# Budget-optimized for RunPod ($10 limit)

model:
  name: "unsloth/Qwen2.5-VL-3B-Instruct"
  max_seq_length: 2048
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  target_modules: "all"

grpo:
  num_generations: 8          # G=8 completions per prompt (olmOCR uses 28, we save compute)
  max_completion_length: 1024  # Max tokens for generation
  learning_rate: 5.0e-6
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 0.5
  bf16: true
  optim: "adamw_8bit"
  logging_steps: 5
  save_steps: 50
  max_steps: 200              # ~200 GRPO steps should be meaningful

reward:
  weights:
    edit_distance: 0.4
    structural: 0.15
    heading: 0.2
    reading_order: 0.25

data:
  train_dir: "data/processed"
  max_train_samples: 500
  languages: ["en", "ja"]

output:
  dir: "results/grpo_run1"
  save_model: true
  push_to_hub: false

runpod:
  gpu_type: "NVIDIA RTX 3090"  # $0.22/hr - cheapest viable option
  gpu_count: 1
  volume_size: 30              # GB for model + data
  max_hours: 10                # Safety limit
